<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0c0b09}
#root{height:100%;overflow:hidden}
:root{
  --bg:#0c0b09;--fg:#f0ebe3;--gold:#d2aa64;--gold2:#e8c070;
  --dim:#7a7068;--dim2:#4a4440;--card:rgba(255,255,255,0.05);
  --cardborder:rgba(255,255,255,0.09);--goldcard:rgba(210,170,100,0.1);
  --goldborder:rgba(210,170,100,0.3);--serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);color:var(--fg);background:var(--bg)}
.screen{height:100%;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:2px}
.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:1px}
/* Cards */
.card{background:var(--card);border:1px solid var(--cardborder);border-radius:12px;padding:1rem 1.1rem;cursor:pointer;transition:all .18s;user-select:none}
.card:active,.card.sel{background:var(--goldcard);border-color:var(--gold)}
/* Buttons */
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;user-select:none}
.btn-gold{background:var(--gold);color:var(--bg);padding:.85rem 2rem;font-size:.95rem;letter-spacing:.05em}
.btn-gold:active{background:var(--gold2);transform:scale(.98)}
.btn-gold:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-ghost{background:none;border:1px solid var(--cardborder);color:var(--dim);padding:.4rem .9rem;font-size:.72rem;border-radius:20px}
.btn-ghost:active,.btn-ghost:hover{border-color:var(--goldborder);color:var(--gold)}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1.4rem;padding:.4rem;transition:opacity .2s;color:var(--fg)}
.btn-icon:active{opacity:.6}
/* Typography */
.title{font-family:var(--serif);font-weight:400;letter-spacing:-.02em}
.label{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:400}
/* Header */
.header{padding:.8rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.8rem;flex-shrink:0;background:rgba(0,0,0,.2)}
/* Mic button */
.mic{width:76px;height:76px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .2s;flex-shrink:0}
.mic-idle{background:rgba(255,255,255,.08)}
.mic-idle:active{background:rgba(210,170,100,.25)}
.mic-rec{background:#c0392b;animation:pulse 1s infinite}
.mic:disabled{opacity:.3;cursor:not-allowed}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}50%{box-shadow:0 0 0 16px rgba(192,57,43,0)}}
/* Speaking waves */
.waves{display:flex;align-items:center;gap:3px}
.wave{width:3px;border-radius:2px;background:var(--gold);animation:wv 1s ease-in-out infinite}
.wave:nth-child(2){animation-delay:.15s}.wave:nth-child(3){animation-delay:.3s}.wave:nth-child(4){animation-delay:.45s}
@keyframes wv{0%,100%{height:4px}50%{height:18px}}
/* Dots loader */
.dots span{display:inline-block;animation:bn 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
/* Chat bubbles */
.bubble-user{background:rgba(210,170,100,.12);border:1px solid rgba(210,170,100,.22);border-radius:16px 16px 4px 16px;padding:.75rem 1rem;max-width:80%;align-self:flex-end;font-size:.9rem;line-height:1.5}
.bubble-char{background:rgba(255,255,255,.05);border:1px solid var(--cardborder);border-radius:16px 16px 16px 4px;padding:.85rem 1.1rem;font-family:var(--serif);font-size:.97rem;line-height:1.7;font-style:italic}
/* Progress bar */
.progress-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease;border-radius:2px}
/* Badge */
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.65rem;font-weight:600;letter-spacing:.05em}
.badge-online{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3)}
.badge-offline{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
/* Phrase cards in play mode */
.phrase-card{background:rgba(255,255,255,.04);border:1px solid var(--cardborder);border-radius:14px;padding:1rem 1.1rem;cursor:pointer;transition:all .2s;user-select:none}
.phrase-card:active,.phrase-card.active{background:var(--goldcard);border-color:var(--gold)}
.phrase-fr{font-size:.72rem;color:var(--dim);margin-top:.3rem}
.phrase-phonetic{font-size:.68rem;color:rgba(210,170,100,.7);margin-top:.2rem;font-style:italic}
/* Input */
.text-input{background:rgba(255,255,255,.05);border:1px solid var(--cardborder);border-radius:10px;padding:.7rem .9rem;color:var(--fg);font-family:var(--sans);font-size:.9rem;resize:none;outline:none;transition:border-color .2s;line-height:1.4;width:100%}
.text-input:focus{border-color:var(--goldborder)}
.text-input::placeholder{color:var(--dim2)}
/* API key screen */
.key-input{background:rgba(255,255,255,.06);border:1px solid var(--cardborder);border-radius:10px;padding:.9rem 1rem;color:var(--fg);font-family:monospace;font-size:.82rem;outline:none;width:100%;transition:border-color .2s}
.key-input:focus{border-color:var(--goldborder)}
/* Generating screen animation */
.gen-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:gd 1.4s ease-in-out infinite}
.gen-dot:nth-child(2){animation-delay:.2s}.gen-dot:nth-child(3){animation-delay:.4s}
@keyframes gd{0%,60%,100%{transform:scale(.7);opacity:.5}30%{transform:scale(1);opacity:1}}
/* Feedback box */
.feedback-box{background:rgba(210,170,100,.06);border:1px solid rgba(210,170,100,.16);border-radius:10px;padding:.8rem .95rem;font-size:.78rem;line-height:1.65;color:#cfc1af;white-space:pre-wrap}
/* Safe area */
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,0px)}
</style>
</head>

//  CONSTANTS
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
//  INDEXEDDB HELPERS
// ═══════════════════════════════════════════════════════════════

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('LangueVivante', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('scenarios')) db.createObjectStore('scenarios', { keyPath: 'key' });
      if (!db.objectStoreNames.contains('settings'))  db.createObjectStore('settings',  { keyPath: 'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = () => reject(req.error);
  });
}

async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result?.value ?? null);
    req.onerror   = () => rej(req.error);
  });
}

async function dbSet(store, key, value) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put({ key, value });
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}

async function dbGetAll(store, prefix) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(
      (req.result || [])
        .filter(r => r.key.startsWith(prefix))
        .map(r => ({ key: r.key, ...r.value }))
    );
    req.onerror = () => rej(req.error);
  });
}

// ═══════════════════════════════════════════════════════════════
//  SPEECH HELPERS
// ═══════════════════════════════════════════════════════════════

function speak(text, bcp47, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = bcp47;
  utt.rate = 0.88;
  const voices = window.speechSynthesis.getVoices();
  const langCode = bcp47.split('-')[0];
  const v = voices.find(v => v.lang === bcp47) || voices.find(v => v.lang.startsWith(langCode));
  if (v) utt.voice = v;
  if (onEnd) utt.onend = onEnd;
  window.speechSynthesis.speak(utt);
  return utt;
}

function stopSpeaking() { window.speechSynthesis?.cancel(); }

// ═══════════════════════════════════════════════════════════════
//  CLAUDE API HELPERS
// ═══════════════════════════════════════════════════════════════

async function claudeCall(apiKey, system, messages, maxTokens = 1500) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, system, messages })
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  return data.content?.map(b => b.text || '').join('') || '';
}

function buildScenarioGenerationPrompt(langName, bcp47, scenarioDef, level) {
  const lvInstr = {
    beginner:     'Use very simple vocabulary. Short sentences. Include extra pronunciation help.',
    intermediate: 'Use natural conversational language. Mix simple and more complex expressions.',
    advanced:     'Use natural speech with idioms, contractions, regional expressions.',
  }[level];

  return `You are generating offline language learning content for a mobile app.

Target language: ${langName} (${bcp47})
Scenario: ${scenarioDef.title} — ${scenarioDef.desc}
Level: ${level} — ${lvInstr}
User's native language: French

Generate a realistic scripted dialogue for this scenario. The user is a French speaker practicing ${langName} in a realistic life situation.

Return ONLY valid JSON, no markdown, no explanation, exactly this structure:

{
  "character": "Short character description in French (e.g. Un passant dans la rue)",
  "setting": "1-sentence scene description in French",
  "opening": {
    "target": "Character's opening line in ${langName}",
    "fr": "French translation"
  },
  "exchanges": [
    {
      "context": "Optional brief context in French (what just happened), or null",
      "userOptions": [
        {
          "phrase": "What the user might say in ${langName}",
          "fr": "French translation",
          "phonetic": "Simplified phonetics in French syllables (e.g. bon-DJOR-no). Use CAPS for stress."
        },
        {
          "phrase": "Alternative phrase in ${langName}",
          "fr": "French translation",
          "phonetic": "Simplified phonetics"
        }
      ],
      "characterResponse": {
        "target": "Character's natural response in ${langName}",
        "fr": "French translation"
      },
      "tip": "One short pronunciation or cultural tip in French (1-2 sentences max)"
    }
  ]
}

Include exactly 6 exchanges that naturally progress through the situation. Make the dialogue realistic and useful. Each userOption phrase should be genuinely useful in real life.`;
}

async function generateScenario(apiKey, lang, scenarioDef, level) {
  const raw = await claudeCall(
    apiKey,
    'You are a language learning content generator. Return ONLY valid JSON, no other text.',
    [{ role: 'user', content: buildScenarioGenerationPrompt(lang.name, lang.bcp47, scenarioDef, level) }],
    2000
  );
  // Strip potential markdown fences
  const clean = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  return JSON.parse(clean);
}

function buildConversationSystemPrompt(langName, scenarioDef, level) {
  const lvInstr = {
    beginner:     'Use simple vocabulary and short sentences. Give detailed corrections and pronunciation tips.',
    intermediate: 'Use natural conversational language. Correct grammar, vocabulary, and pronunciation mistakes.',
    advanced:     'Use nuanced, idiomatic language. Only correct significant errors. Focus on subtle pronunciation and register.',
  }[level];

  return `You are an immersive language tutor playing a character to help a French speaker practice ${langName}.

SCENARIO: ${scenarioDef.title} — ${scenarioDef.desc}
Play a realistic character fitting this scenario. Stay in character and keep the conversation going naturally.

LEVEL: ${lvInstr}

The user speaks via voice (speech is transcribed). Always give pronunciation feedback.

RESPONSE FORMAT — use exactly this structure:

[CHARACTER]
Your in-character response in ${langName}. Natural, 2-4 sentences.
[/CHARACTER]

[PHONETIC]
Phonetic guide for 2-4 key words/phrases in your response. Format: "word" → foh-NET-ik
[/PHONETIC]

[FEEDBACK]
In French — warm, encouraging:
- ✅ Ce qui était bien
- 🔧 Corrections (if any, with explanation)
- 🗣 Prononciation: specific tips for French speakers on the words the user used
- 💡 Conseil (optional cultural/idiomatic tip)
[/FEEDBACK]`;
}

function parseConvResponse(text) {
  const char  = text.match(/\[CHARACTER\]([\s\S]*?)\[\/CHARACTER\]/)?.[1]?.trim() || text;
  const phone = text.match(/\[PHONETIC\]([\s\S]*?)\[\/PHONETIC\]/)?.[1]?.trim() || null;
  const feed  = text.match(/\[FEEDBACK\]([\s\S]*?)\[\/FEEDBACK\]/)?.[1]?.trim() || null;
  return { character: char, phonetic: phone, feedback: feed };
}

// ═══════════════════════════════════════════════════════════════
//  HOOKS
// ═══════════════════════════════════════════════════════════════

const { useState, useEffect, useRef, useCallback } = React;

function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on  = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  return online;
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: API KEY SETUP

function ApiKeyScreen({ onSave }) {
  const [key, setKey] = useState('');

      return;
    }
    setTesting(true); setError('');
    try {
      await claudeCall(key.trim(), 'Reply with the word OK only.', [{ role: 'user', content: 'test' }], 10);
      onSave(key.trim());
    } catch {
      setError('Clé invalide ou erreur réseau. Vérifiez votre connexion.');
    }
    setTesting(false);
  }

  return (
    <div className="screen" style={{ alignItems:'center', justifyContent:'center', padding:'2rem 1.5rem' }}>
      <div style={{ maxWidth:420, width:'100%' }}>
        <div style={{ textAlign:'center', marginBottom:'2.5rem' }}>
          <div style={{ fontSize:'3rem', marginBottom:'.6rem' }}>🎙</div>
          <h1 className="title" style={{ fontSize:'2.2rem', marginBottom:'.4rem' }}>Langue Vivante</h1>
          <p style={{ color:'var(--dim)', fontSize:'.88rem', fontWeight:300 }}>
            Apprendre par l'immersion, pas par les listes
          </p>
        </div>

        <div style={{ background:'var(--card)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1.4rem' }}>
          <p style={{ fontSize:'.82rem', lineHeight:1.7, color:'var(--dim)', marginBottom:'1.2rem' }}>
            Cette app utilise Claude pour générer et corriger vos conversations.<br/>
            Entrez votre clé API Anthropic — elle est stockée <strong style={{color:'var(--fg)'}}>uniquement sur votre téléphone</strong>, jamais envoyée ailleurs.
          </p>

          <label className="label" style={{ display:'block', marginBottom:'.5rem' }}>Clé API Anthropic</label>
          <input
            className="key-input"
            type="password"
            placeholder="sk-ant-api03-..."
            value={key}
            onChange={e => setKey(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSave()}
            style={{ display:'block', marginBottom:'.8rem' }}
          />

          {error && <p style={{ color:'#e74c3c', fontSize:'.78rem', marginBottom:'.8rem' }}>{error}</p>}

          <button className="btn btn-gold" style={{ width:'100%' }} onClick={handleSave} disabled={!key.trim() || testing}>
            {testing ? 'Vérification…' : 'Continuer →'}
          </button>

          <p style={{ fontSize:'.7rem', color:'var(--dim2)', marginTop:'1rem', textAlign:'center', lineHeight:1.6 }}>
            Obtenez une clé sur <strong style={{color:'var(--dim)'}}>console.anthropic.com</strong><br/>
            ~0.01–0.05€ par conversation
          </p>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════

function HomeScreen({ lang, level, apiKey, onPlay, onConverse, onSettings }) {
  const [cached,    setCached]    = useState({});
  const [loading,   setLoading]   = useState(true);
  const [generating, setGenerating] = useState(null);
  const online = useOnlineStatus();

  useEffect(() => {
    async function loadCached() {
      const all = await dbGetAll('scenarios', `${lang.code}_${level}_`);
      const map = {};
      all.forEach(item => { const id = item.key.replace(`${lang.code}_${level}_`,''); map[id] = item; });
      setCached(map);
      setLoading(false);
    }
    loadCached();
  }, [lang, level]);

  async function handleGenerate(scenarioDef) {
    if (!online) return;
    setGenerating(scenarioDef.id);
    try {
      const data = await generateScenario(apiKey, lang, scenarioDef, level);
      const key  = `${lang.code}_${level}_${scenarioDef.id}`;
      await dbSet('scenarios', key, data);
      setCached(prev => ({ ...prev, [scenarioDef.id]: data }));
    } catch(e) {
      alert('Erreur lors de la génération. Vérifiez votre connexion.');
    }
    setGenerating(null);
  }

  async function handleGenerateAll() {
    const missing = SCENARIO_DEFS.filter(s => !cached[s.id]);
    for (const s of missing) await handleGenerate(s);
  }

  const missingCount = SCENARIO_DEFS.filter(s => !cached[s.id]).length;

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={onSettings}>⚙</button>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:600, fontSize:'.9rem' }}>{lang.flag} {lang.name} · {LEVELS.find(l=>l.id===level)?.label}</div>
          <div style={{ fontSize:'.68rem', color:'var(--dim)', marginTop:'.1rem' }}>
            <span className={`badge ${online ? 'badge-online' : 'badge-offline'}`}>
              {online ? '⬤ En ligne' : '⬤ Hors ligne'}
            </span>
          </div>
        </div>
        {online && missingCount > 0 && (
          <button className="btn-ghost" onClick={handleGenerateAll} disabled={generating !== null}>
            {generating ? '…' : `⬇ Tout télécharger (${missingCount})`}
          </button>
        )}
      </div>

      {loading ? (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ display:'flex', gap:'.5rem' }}>
            <div className="gen-dot" /><div className="gen-dot" /><div className="gen-dot" />
          </div>
        </div>
      ) : (
        <div className="scroll" style={{ padding:'1rem' }}>
          <p style={{ fontSize:'.78rem', color:'var(--dim)', marginBottom:'1rem', lineHeight:1.6 }}>
            {online
              ? `Appuyez sur ⬇ pour télécharger un scénario (fonctionne ensuite hors ligne).`
              : `Mode hors ligne — seuls les scénarios téléchargés sont disponibles.`}
          </p>

          <div style={{ display:'flex', flexDirection:'column', gap:'.65rem' }}>
            {SCENARIO_DEFS.map(sc => {
              const isCached = !!cached[sc.id];
              const isGen    = generating === sc.id;
              return (
                <div key={sc.id} style={{ background:'var(--card)', border:'1px solid', borderColor: isCached ? 'rgba(210,170,100,.2)' : 'var(--cardborder)', borderRadius:14, padding:'1rem 1.1rem' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'.7rem', marginBottom:'.4rem' }}>
                    <span style={{ fontSize:'1.3rem' }}>{sc.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:'.9rem' }}>{sc.title}</div>
                      <div style={{ fontSize:'.72rem', color:'var(--dim)', marginTop:'.1rem' }}>{sc.desc}</div>
                    </div>
                    {isCached && <span style={{ fontSize:'.65rem', color:'var(--gold)' }}>✓ Prêt</span>}
                  </div>

                  {isCached ? (
                    <div style={{ display:'flex', gap:'.5rem', marginTop:'.6rem' }}>
                      <button className="btn btn-gold" style={{ flex:1, padding:'.55rem', fontSize:'.8rem' }} onClick={() => onPlay(sc, cached[sc.id], lang)}>
                        📚 Pratiquer
                      </button>
                      {online && (
                        <button className="btn-ghost" style={{ padding:'.55rem .8rem' }} onClick={() => onConverse(sc, lang, level)} title="Conversation libre en ligne">
                          💬 Libre
                        </button>
                      )}
                      {online && (
                        <button className="btn-ghost" style={{ padding:'.55rem .8rem' }} onClick={() => handleGenerate(sc)} disabled={isGen} title="Régénérer">
                          {isGen ? '…' : '↻'}
                        </button>
                      )}
                    </div>
                  ) : (
                    <div style={{ display:'flex', gap:'.5rem', marginTop:'.6rem' }}>
                      {online ? (
                        <>
                          <button className="btn-ghost" style={{ flex:1, padding:'.55rem', fontSize:'.8rem' }} onClick={() => handleGenerate(sc)} disabled={isGen}>
                            {isGen ? 'Génération…' : '⬇ Télécharger pour hors ligne'}
                          </button>
                          <button className="btn btn-gold" style={{ padding:'.55rem .9rem', fontSize:'.8rem' }} onClick={() => onConverse(sc, lang, level)}>
                            💬
                          </button>
                        </>
                      ) : (
                        <p style={{ fontSize:'.75rem', color:'var(--dim2)', padding:'.3rem 0' }}>Connectez-vous pour télécharger</p>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ height:'1.5rem' }} />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: SCRIPTED PRACTICE (offline mode)
// ═══════════════════════════════════════════════════════════════

function PlayScreen({ scenario, data, lang, onBack }) {
  const [step,       setStep]       = useState(-1); // -1 = intro
  const [chosen,     setChosen]     = useState(null);
  const [showResp,   setShowResp]   = useState(false);
  const [showTip,    setShowTip]    = useState(false);
  const [speaking,   setSpeaking]   = useState(false);
  const [recording,  setRecording]  = useState(false);
  const [recognized, setRecognized] = useState('');
  const [showPhonetic, setShowPhonetic] = useState(null);
  const recRef = useRef(null);

  const exchange  = step >= 0 ? data.exchanges[step] : null;
  const total     = data.exchanges.length;
  const done      = step >= total;

  function doSpeak(text, onEnd) {
    setSpeaking(true);
    speak(text, lang.bcp47, () => { setSpeaking(false); onEnd?.(); });
  }

  function handleStart() {
    setStep(0); setChosen(null); setShowResp(false); setShowTip(false); setRecognized('');
    doSpeak(data.opening.target);
  }

  function handleChoose(idx) {
    if (chosen !== null) return;
    setChosen(idx);
    setShowPhonetic(idx);
    const phrase = exchange.userOptions[idx].phrase;
    setTimeout(() => doSpeak(phrase, () => {
      setTimeout(() => { setShowResp(true); doSpeak(exchange.characterResponse.target); }, 600);
    }), 300);
  }

  function handleListen() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Reconnaissance vocale non disponible (Chrome requis)'); return; }
    stopSpeaking();
    const rec = new SR();
    rec.lang = lang.bcp47;
    rec.interimResults = false;
    recRef.current = rec;
    rec.onstart  = () => { setRecording(true); setRecognized(''); };
    rec.onresult = e => { const t = Array.from(e.results).map(r=>r[0].transcript).join(''); setRecognized(t); };
    rec.onend    = () => setRecording(false);
    rec.onerror  = () => setRecording(false);
    rec.start();
  }

  function handleNext() {
    const next = step + 1;
    setStep(next);
    setChosen(null); setShowResp(false); setShowTip(false); setRecognized(''); setShowPhonetic(null);
    if (next < total) {
      stopSpeaking();
      const ex = data.exchanges[next];
      if (ex.context) {
        setTimeout(() => doSpeak(ex.characterResponse?.target || ''), 300);
      }
    }
  }

  if (done) {
    return (
      <div className="screen" style={{ alignItems:'center', justifyContent:'center', padding:'2rem', textAlign:'center' }}>
        <div style={{ fontSize:'3rem', marginBottom:'1rem' }}>🎉</div>
        <h2 className="title" style={{ fontSize:'1.6rem', marginBottom:'.6rem' }}>Scénario terminé !</h2>
        <p style={{ color:'var(--dim)', fontSize:'.88rem', lineHeight:1.7, marginBottom:'2rem' }}>
          Vous avez pratiqué toutes les situations de ce scénario.<br/>
          Recommencez ou essayez la conversation libre en ligne.
        </p>
        <button className="btn btn-gold" onClick={onBack}>← Retour aux scénarios</button>
      </div>
    );
  }

  if (step === -1) {
    return (
      <div className="screen">
        <div className="header">
          <button className="btn-ghost" onClick={onBack}>← Retour</button>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontWeight:600, fontSize:'.9rem' }}>{scenario.icon} {scenario.title}</div>
          </div>
          <div style={{ width:60 }} />
        </div>
        <div className="scroll" style={{ padding:'1.5rem 1rem', display:'flex', flexDirection:'column', gap:'1.2rem' }}>
          <div style={{ background:'var(--card)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1.2rem' }}>
            <p className="label" style={{ marginBottom:'.5rem' }}>La situation</p>
            <p style={{ fontSize:'.92rem', lineHeight:1.7 }}>{data.setting}</p>
          </div>
          <div style={{ background:'var(--card)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1.2rem' }}>
            <p className="label" style={{ marginBottom:'.5rem' }}>Votre interlocuteur</p>
            <p style={{ fontSize:'.92rem' }}>{data.character}</p>
          </div>
          <div style={{ background:'rgba(210,170,100,.07)', border:'1px solid rgba(210,170,100,.2)', borderRadius:14, padding:'1.2rem' }}>
            <p className="label" style={{ marginBottom:'.5rem' }}>Première réplique</p>
            <p style={{ fontFamily:'var(--serif)', fontStyle:'italic', fontSize:'1rem', lineHeight:1.65, marginBottom:'.5rem' }}>{data.opening.target}</p>
            <p style={{ fontSize:'.78rem', color:'var(--dim)' }}>🇫🇷 {data.opening.fr}</p>
          </div>
          <button className="btn btn-gold" style={{ width:'100%', padding:'1rem' }} onClick={handleStart}>
            🎙 Commencer la scène
          </button>
          <div style={{ height:'1rem' }} />
        </div>
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={onBack}>← Retour</button>
        <div style={{ flex:1, padding:'0 .5rem' }}>
          <div style={{ fontWeight:500, fontSize:'.82rem', marginBottom:'.3rem' }}>{scenario.icon} {scenario.title} · {step+1}/{total}</div>
          <div className="progress-bar"><div className="progress-fill" style={{ width:`${((step+1)/total)*100}%` }} /></div>
        </div>
        {speaking ? (
          <div className="waves"><div className="wave"/><div className="wave"/><div className="wave"/><div className="wave"/></div>
        ) : (
          <button className="btn-icon" onClick={() => doSpeak(showResp ? exchange.characterResponse.target : data.opening.target)}>🔊</button>
        )}
      </div>

      <div className="scroll" style={{ padding:'1rem', display:'flex', flexDirection:'column', gap:'1rem' }}>

        {/* Character line */}
        <div>
          {exchange.context && <p style={{ fontSize:'.75rem', color:'var(--dim)', marginBottom:'.5rem', fontStyle:'italic' }}>📍 {exchange.context}</p>}
          {!showResp ? (
            <div style={{ background:'rgba(255,255,255,.04)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1rem 1.1rem' }}>
              <p style={{ fontSize:'.7rem', color:'var(--dim)', marginBottom:'.4rem' }}>Le personnage dit :</p>
              <p style={{ fontFamily:'var(--serif)', fontStyle:'italic', fontSize:'.97rem', lineHeight:1.65 }}>
                {step === 0 ? data.opening.target : '…'}
              </p>
            </div>
          ) : (
            <div style={{ background:'rgba(255,255,255,.04)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1rem 1.1rem' }}>
              <p style={{ fontSize:'.7rem', color:'var(--dim)', marginBottom:'.4rem' }}>Réponse du personnage :</p>
              <p style={{ fontFamily:'var(--serif)', fontStyle:'italic', fontSize:'.97rem', lineHeight:1.65, marginBottom:'.5rem' }}>{exchange.characterResponse.target}</p>
              <p style={{ fontSize:'.75rem', color:'var(--dim)' }}>🇫🇷 {exchange.characterResponse.fr}</p>
              {exchange.tip && (
                <div style={{ marginTop:'.7rem', background:'rgba(210,170,100,.07)', border:'1px solid rgba(210,170,100,.18)', borderRadius:8, padding:'.6rem .8rem' }}>
                  <p style={{ fontSize:'.73rem', color:'var(--gold)', lineHeight:1.6 }}>💡 {exchange.tip}</p>
                </div>
              )}
            </div>
          )}
        </div>

        {/* User options */}
        {!showResp && (
          <div>
            <p style={{ fontSize:'.72rem', color:'var(--dim)', marginBottom:'.6rem' }}>Que dites-vous ? Tapez une option, puis essayez de la dire :</p>
            <div style={{ display:'flex', flexDirection:'column', gap:'.55rem' }}>
              {exchange.userOptions.map((opt, i) => (
                <div key={i}>
                  <div className={`phrase-card ${chosen === i ? 'active' : ''}`} onClick={() => handleChoose(i)}>
                    <div style={{ fontWeight:500, fontSize:'.92rem' }}>{opt.phrase}</div>
                    <div className="phrase-fr">{opt.fr}</div>
                    {showPhonetic === i && <div className="phrase-phonetic">🔊 {opt.phonetic}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Practice speaking */}
        {chosen !== null && !showResp && (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'.7rem', padding:'.5rem 0' }}>
            <p style={{ fontSize:'.75rem', color:'var(--dim)', textAlign:'center' }}>Maintenant, essayez de le dire :</p>
            <button
              className={`mic ${recording ? 'mic-rec' : 'mic-idle'}`}
              onMouseDown={handleListen}
              onMouseUp={() => recRef.current?.stop()}
              onTouchStart={e => { e.preventDefault(); handleListen(); }}
              onTouchEnd={e => { e.preventDefault(); recRef.current?.stop(); }}
            >
              {recording ? '⏹' : '🎙'}
            </button>
            {recognized && (
              <div style={{ background:'rgba(255,255,255,.04)', borderRadius:10, padding:'.6rem .9rem', fontSize:'.82rem', color:'var(--fg)', textAlign:'center' }}>
                Reconnu : <em>"{recognized}"</em>
              </div>
            )}
          </div>
        )}

        {/* Next button */}
        {showResp && (
          <button className="btn btn-gold" style={{ width:'100%', padding:'1rem' }} onClick={handleNext}>
            {step + 1 >= total ? 'Terminer le scénario ✓' : 'Échange suivant →'}
          </button>
        )}

        <div style={{ height:'1.5rem' }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: FREE CONVERSATION (online AI mode)
// ═══════════════════════════════════════════════════════════════

function ConvScreen({ scenario, lang, level, apiKey, onBack }) {
  const [messages,  setMessages]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [speaking,  setSpeaking]  = useState(false);
  const [recording, setRecording] = useState(false);
  const [liveText,  setLiveText]  = useState('');
  const [textInput, setTextInput] = useState('');
  const [inputMode, setInputMode] = useState('voice');
  const [expanded,  setExpanded]  = useState({});
  const msgsRef  = useRef([]);
  const recRef   = useRef(null);
  const lastRef  = useRef('');
  const bottomRef = useRef(null);
  msgsRef.current = messages;

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

  useEffect(() => {
    startScene();
    return () => stopSpeaking();
  }, []);

  async function startScene() {
    const sys = buildConversationSystemPrompt(lang.name, scenario, level);
    const openingMsg = `(Start the scene. Give your natural opening line as the character — 1-3 sentences. In [FEEDBACK], welcome the user in French, describe the situation briefly, and give 3 starter phrases they might use in ${lang.name} with French translation and phonetic guide.)`;
    try {
      const raw = await claudeCall(apiKey, sys, [{ role:'user', content: openingMsg }]);
      const parsed = parseConvResponse(raw);
      const msg = { role:'assistant', ...parsed, id: Date.now() };
      setMessages([msg]);
      setExpanded({ [msg.id]: true });
      setTimeout(() => { setSpeaking(true); speak(parsed.character, lang.bcp47, () => setSpeaking(false)); }, 500);
    } catch { setMessages([{ role:'assistant', character:'Erreur de démarrage.', phonetic:null, feedback:null, id:Date.now() }]); }
    setLoading(false);
  }

  async function sendMsg(text) {
    if (!text.trim() || loading) return;
    stopSpeaking(); setSpeaking(false);
    const userMsg = { role:'user', content: text.trim(), id: Date.now() };
    const updated = [...msgsRef.current, userMsg];
    setMessages(updated);
    setLoading(true);
    const sys = buildConversationSystemPrompt(lang.name, scenario, level);
    const apiMsgs = updated.map(m => ({
      role: m.role,
      content: m.role === 'user' ? m.content
        : `[CHARACTER]\n${m.character}\n[/CHARACTER]\n\n[PHONETIC]\n${m.phonetic||''}\n[/PHONETIC]\n\n[FEEDBACK]\n${m.feedback||''}\n[/FEEDBACK]`,
    }));
    try {
      const raw = await claudeCall(apiKey, sys, apiMsgs);
      const parsed = parseConvResponse(raw);
      const msg = { role:'assistant', ...parsed, id: Date.now() };
      setMessages(prev => [...prev, msg]);
      setSpeaking(true);
      speak(parsed.character, lang.bcp47, () => setSpeaking(false));
    } catch { setMessages(prev => [...prev, { role:'assistant', character:'Erreur réseau.', phonetic:null, feedback:null, id:Date.now() }]); }
    setLoading(false);
  }

  function startRec() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Utilisez Chrome ou Edge pour la reconnaissance vocale'); return; }
    if (loading) return;
    stopSpeaking(); setSpeaking(false);
    const rec = new SR();
    rec.lang = lang.bcp47;
    rec.interimResults = true;
    recRef.current = rec;
    lastRef.current = '';
    rec.onstart = () => { setRecording(true); setLiveText(''); };
    rec.onresult = e => {
      let t = '';
      for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
      setLiveText(t); lastRef.current = t;
    };
    rec.onend = () => { setRecording(false); setLiveText(''); if (lastRef.current.trim()) sendMsg(lastRef.current); };
    rec.onerror = () => { setRecording(false); setLiveText(''); };
    rec.start();
  }

  function stopRec() { recRef.current?.stop(); }

  const lastAsst = messages.filter(m => m.role === 'assistant').at(-1);

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={() => { stopSpeaking(); onBack(); }}>← Retour</button>
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontWeight:500, fontSize:'.82rem' }}>{scenario.icon} {scenario.title}</div>
          <div style={{ fontSize:'.65rem', color:'var(--dim)' }}>{lang.flag} {lang.name} · Conversation libre</div>
        </div>
        {speaking ? (
          <div className="waves"><div className="wave"/><div className="wave"/><div className="wave"/></div>
        ) : lastAsst ? (
          <button className="btn-icon" style={{ fontSize:'1.1rem' }} onClick={() => { setSpeaking(true); speak(lastAsst.character, lang.bcp47, ()=>setSpeaking(false)); }}>🔊</button>
        ) : <div style={{ width:36 }} />}
      </div>

      {/* Messages */}
      <div className="scroll" style={{ padding:'1rem', display:'flex', flexDirection:'column', gap:'.9rem' }}>
        {messages.map(msg => (
          <div key={msg.id} style={{ display:'flex', flexDirection:'column' }}>
            {msg.role === 'user' ? (
              <div className="bubble-user">{msg.content}</div>
            ) : (
              <div style={{ alignSelf:'flex-start', maxWidth:'88%' }}>
                <div className="bubble-char">
                  {msg.character}
                  {msg.phonetic && <span style={{ display:'block', fontFamily:'var(--sans)', fontSize:'.68rem', color:'var(--dim)', fontStyle:'normal', marginTop:'.35rem' }}>🔊 {msg.phonetic}</span>}
                </div>
                {msg.feedback && (
                  <>
                    <button className="btn-ghost" style={{ marginTop:'.4rem' }} onClick={() => setExpanded(p => ({ ...p, [msg.id]: !p[msg.id] }))}>
                      {expanded[msg.id] ? '▲ Masquer' : '▼ Retour pédagogique'}
                    </button>
                    {expanded[msg.id] && <div className="feedback-box" style={{ marginTop:'.4rem' }}>{msg.feedback}</div>}
                  </>
                )}
              </div>
            )}
          </div>
        ))}

        {loading && (
          <div style={{ alignSelf:'flex-start' }}>
            <div className="bubble-char" style={{ color:'var(--dim2)' }}>
              <span className="dots"><span>●</span> <span>●</span> <span>●</span></span>
            </div>
          </div>
        )}

        {recording && liveText && (
          <div style={{ alignSelf:'flex-end', fontStyle:'italic', fontSize:'.85rem', color:'var(--dim)', padding:'.5rem .9rem', background:'rgba(255,255,255,.03)', borderRadius:10, maxWidth:'80%' }}>
            {liveText}…
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Input zone */}
      <div style={{ borderTop:'1px solid rgba(255,255,255,.07)', padding:'.9rem 1rem', background:'rgba(0,0,0,.2)', flexShrink:0 }} className="safe-bottom">
        {inputMode === 'voice' ? (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'.55rem' }}>
            <button
              className={`mic ${recording ? 'mic-rec' : 'mic-idle'}`}
              onMouseDown={startRec}
              onMouseUp={stopRec}
              onTouchStart={e => { e.preventDefault(); startRec(); }}
              onTouchEnd={e => { e.preventDefault(); stopRec(); }}
              disabled={loading}
            >
              {recording ? '⏹' : '🎙'}
            </button>
            <p style={{ fontSize:'.68rem', color:'var(--dim2)', textAlign:'center' }}>
              {recording ? `Parlez en ${lang.name}… relâchez pour envoyer` : loading ? 'En train de répondre…' : 'Maintenez pour parler'}
            </p>
            <button className="btn-ghost" onClick={() => setInputMode('text')}>⌨ Passer au texte</button>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
            <div style={{ display:'flex', gap:'.5rem', alignItems:'flex-end' }}>
              <textarea
                className="text-input"
                rows={2}
                placeholder={`Écrivez en ${lang.name}…`}
                value={textInput}
                onChange={e => setTextInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(textInput); setTextInput(''); } }}
                disabled={loading}
              />
              <button className="btn btn-gold" style={{ padding:'.7rem .9rem', flexShrink:0 }}
                onClick={() => { sendMsg(textInput); setTextInput(''); }} disabled={loading || !textInput.trim()}>→</button>
            </div>
            <button className="btn-ghost" style={{ alignSelf:'center' }} onClick={() => setInputMode('voice')}>🎙 Passer à la voix</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [screen,    setScreen]    = useState('loading');
  const [apiKey,    setApiKey]    = useState('');
  const [lang,      setLang]      = useState(null);
  const [level,     setLevel]     = useState('intermediate');
  const [playData,  setPlayData]  = useState(null);
  const [playScen,  setPlayScen]  = useState(null);
  const [convScen,  setConvScen]  = useState(null);

  // Load saved settings on boot
  useEffect(() => {
    async function boot() {
      try {
        const key    = await dbGet('settings', 'apiKey');
        const langK  = await dbGet('settings', 'lang');
        const levelK = await dbGet('settings', 'level');
        if (key)    setApiKey(key);
        if (langK)  setLang(langK);
        if (levelK) setLevel(levelK);
        setScreen(key ? (langK ? 'home' : 'setup') : 'apikey');
      } catch {
        setScreen('apikey');
      }
    }
    boot();
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    // Preload voices
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
    }
  }, []);

  async function handleApiKey(key) {
    await dbSet('settings', 'apiKey', key);
    setApiKey(key);
    setScreen(lang ? 'home' : 'setup');
  }

  async function handleSetup(newLang, newLevel) {
    await dbSet('settings', 'lang',  newLang);
    await dbSet('settings', 'level', newLevel);
    setLang(newLang);
    setLevel(newLevel);
    setScreen('home');
  }

  function handlePlay(sc, data, l) {
    setPlayScen(sc); setPlayData(data); setLang(l);
    setScreen('play');
  }

  function handleConverse(sc, l, lv) {
    setConvScen(sc); setLang(l); setLevel(lv);
    setScreen('conv');
  }

  if (screen === 'loading') {
    return (
      <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ display:'flex', gap:'.5rem' }}>
          <div className="gen-dot"/><div className="gen-dot"/><div className="gen-dot"/>
        </div>
      </div>
    );
  }

  if (screen === 'apikey') return <ApiKeyScreen onSave={handleApiKey} />;
  if (screen === 'setup')  return <SetupScreen  onConfirm={handleSetup} savedLang={lang} savedLevel={level} />;

  if (screen === 'home') return (
    <HomeScreen
      lang={lang} level={level} apiKey={apiKey}
      onPlay={handlePlay}
      onConverse={handleConverse}
      onSettings={() => setScreen('setup')}
    />
  );

  if (screen === 'play' && playData) return (
    <PlayScreen scenario={playScen} data={playData} lang={lang} onBack={() => setScreen('home')} />
  );

  if (screen === 'conv' && convScen) return (
    <ConvScreen scenario={convScen} lang={lang} level={level} apiKey={apiKey} onBack={() => setScreen('home')} />
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
