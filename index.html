<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0c0b09">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Langue Vivante</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0c0b09}
#root{height:100%;overflow:hidden}
:root{
  --bg:#0c0b09;--fg:#f0ebe3;--gold:#d2aa64;--gold2:#e8c070;
  --dim:#7a7068;--dim2:#4a4440;--card:rgba(255,255,255,0.05);
  --cardborder:rgba(255,255,255,0.09);--goldcard:rgba(210,170,100,0.1);
  --goldborder:rgba(210,170,100,0.3);--serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);color:var(--fg);background:var(--bg)}
.screen{height:100%;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:2px}
.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:1px}
.card{background:var(--card);border:1px solid var(--cardborder);border-radius:12px;padding:1rem 1.1rem;cursor:pointer;transition:all .18s;user-select:none}
.card:active,.card.sel{background:var(--goldcard);border-color:var(--gold)}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;user-select:none}
.btn-gold{background:var(--gold);color:var(--bg);padding:.85rem 2rem;font-size:.95rem;letter-spacing:.05em}
.btn-gold:active{background:var(--gold2);transform:scale(.98)}
.btn-gold:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-ghost{background:none;border:1px solid var(--cardborder);color:var(--dim);padding:.4rem .9rem;font-size:.72rem;border-radius:20px}
.btn-ghost:active{border-color:var(--goldborder);color:var(--gold)}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1.4rem;padding:.4rem;color:var(--fg)}
.label{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:400}
.header{padding:.8rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.8rem;flex-shrink:0;background:rgba(0,0,0,.2)}
.mic{width:76px;height:76px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .2s;flex-shrink:0}
.mic-idle{background:rgba(255,255,255,.08)}
.mic-idle:active{background:rgba(210,170,100,.25)}
.mic-rec{background:#c0392b;animation:pulse 1s infinite}
.mic:disabled{opacity:.3;cursor:not-allowed}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}50%{box-shadow:0 0 0 16px rgba(192,57,43,0)}}
.waves{display:flex;align-items:center;gap:3px}
.wave{width:3px;border-radius:2px;background:var(--gold);animation:wv 1s ease-in-out infinite}
.wave:nth-child(2){animation-delay:.15s}.wave:nth-child(3){animation-delay:.3s}.wave:nth-child(4){animation-delay:.45s}
@keyframes wv{0%,100%{height:4px}50%{height:18px}}
.dots span{display:inline-block;animation:bn 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.bubble-user{background:rgba(210,170,100,.12);border:1px solid rgba(210,170,100,.22);border-radius:16px 16px 4px 16px;padding:.75rem 1rem;max-width:80%;align-self:flex-end;font-size:.9rem;line-height:1.5}
.bubble-char{background:rgba(255,255,255,.05);border:1px solid var(--cardborder);border-radius:16px 16px 16px 4px;padding:.85rem 1.1rem;font-family:var(--serif);font-size:.97rem;line-height:1.7;font-style:italic}
.progress-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease;border-radius:2px}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.65rem;font-weight:600;letter-spacing:.05em}
.badge-online{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3)}
.badge-offline{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
.phrase-card{background:rgba(255,255,255,.04);border:1px solid var(--cardborder);border-radius:14px;padding:1rem 1.1rem;cursor:pointer;transition:all .2s;user-select:none}
.phrase-card:active,.phrase-card.active{background:var(--goldcard);border-color:var(--gold)}
.phrase-fr{font-size:.72rem;color:var(--dim);margin-top:.3rem}
.phrase-phonetic{font-size:.68rem;color:rgba(210,170,100,.7);margin-top:.2rem;font-style:italic}
.text-input{background:rgba(255,255,255,.05);border:1px solid var(--cardborder);border-radius:10px;padding:.7rem .9rem;color:var(--fg);font-family:var(--sans);font-size:.9rem;resize:none;outline:none;transition:border-color .2s;line-height:1.4;width:100%}
.text-input:focus{border-color:var(--goldborder)}
.text-input::placeholder{color:var(--dim2)}
.key-input{background:rgba(255,255,255,.06);border:1px solid var(--cardborder);border-radius:10px;padding:.9rem 1rem;color:var(--fg);font-family:monospace;font-size:.82rem;outline:none;width:100%;transition:border-color .2s}
.key-input:focus{border-color:var(--goldborder)}
.gen-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:gd 1.4s ease-in-out infinite}
.gen-dot:nth-child(2){animation-delay:.2s}.gen-dot:nth-child(3){animation-delay:.4s}
@keyframes gd{0%,60%,100%{transform:scale(.7);opacity:.5}30%{transform:scale(1);opacity:1}}
.feedback-box{background:rgba(210,170,100,.06);border:1px solid rgba(210,170,100,.16);border-radius:10px;padding:.8rem .95rem;font-size:.78rem;line-height:1.65;color:#cfc1af;white-space:pre-wrap}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,0px)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const LANGUAGES = [
  { code:'es', name:'Español',   flag:'🇪🇸', bcp47:'es-ES' },
  { code:'en', name:'English',   flag:'🇬🇧', bcp47:'en-GB' },
  { code:'de', name:'Deutsch',   flag:'🇩🇪', bcp47:'de-DE' },
  { code:'it', name:'Italiano',  flag:'🇮🇹', bcp47:'it-IT' },
  { code:'pt', name:'Português', flag:'🇧🇷', bcp47:'pt-BR' },
  { code:'ja', name:'日本語',     flag:'🇯🇵', bcp47:'ja-JP' },
];

const SCENARIO_DEFS = [
  { id:'chemin',     icon:'🗺️',  title:'Demander son chemin',    desc:'Perdu dans une ville inconnue' },
  { id:'tourisme',   icon:'📸',  title:'Infos touristiques',      desc:'Que voir, où aller, recommandations' },
  { id:'restaurant', icon:'🍽️', title:'Au restaurant',            desc:'Commander, allergie, addition' },
  { id:'marche',     icon:'🛒',  title:'Au marché / magasin',     desc:'Acheter, prix, couleurs, tailles' },
  { id:'transport',  icon:'🚌',  title:'Transports en commun',    desc:'Bus, métro, taxi, billet, horaires' },
  { id:'medecin',    icon:'🏥',  title:'Chez le médecin',         desc:'Symptômes, ordonnance, urgences' },
  { id:'hotel',      icon:'🏨',  title:"À l'hôtel",               desc:'Check-in, problème, services' },
  { id:'urgence',    icon:'🆘',  title:'Situation difficile',     desc:'Objet perdu/volé, aide, incompréhension' },
];

const LEVELS = [
  { id:'beginner',     label:'Débutant',     desc:'Phrases simples, corrections détaillées' },
  { id:'intermediate', label:'Intermédiaire', desc:'Naturel, corrections ciblées' },
  { id:'advanced',     label:'Avancé',        desc:'Nuances, expressions idiomatiques' },
];

// ── IndexedDB ──────────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('LangueVivante', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('scenarios')) db.createObjectStore('scenarios', { keyPath:'key' });
      if (!db.objectStoreNames.contains('settings'))  db.createObjectStore('settings',  { keyPath:'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = () => reject(req.error);
  });
}
async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).get(key);
    req.onsuccess = () => res(req.result?.value ?? null);
    req.onerror   = () => rej(req.error);
  });
}
async function dbSet(store, key, value) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).put({ key, value });
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}
async function dbGetAll(store, prefix) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = () => res(
      (req.result||[]).filter(r=>r.key.startsWith(prefix)).map(r=>({key:r.key,...r.value}))
    );
    req.onerror = () => rej(req.error);
  });
}

// ── Voix ───────────────────────────────────────────────────
function speak(text, bcp47, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = bcp47; utt.rate = 0.88;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v=>v.lang===bcp47) || voices.find(v=>v.lang.startsWith(bcp47.split('-')[0]));
  if (v) utt.voice = v;
  if (onEnd) utt.onend = onEnd;
  window.speechSynthesis.speak(utt);
}
function stopSpeaking() { window.speechSynthesis?.cancel(); }

// ── Gemini API — clé lue depuis IndexedDB ──────────────────
async function geminiCall(apiKey, systemPrompt, messages) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
  const contents = messages.map(m => ({
    role: m.role==='assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents,
      generationConfig: { maxOutputTokens: 1500, temperature: 0.8 }
    })
  });
  if (!res.ok) throw new Error(`Gemini ${res.status}`);
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function buildGenPrompt(langName, bcp47, sc, level) {
  const lv = { beginner:'Simple vocabulary, short sentences.', intermediate:'Natural conversational language.', advanced:'Idioms, contractions, natural speech.' }[level];
  return `You are generating offline language learning content.
Target language: ${langName} (${bcp47})
Scenario: ${sc.title} — ${sc.desc}
Level: ${level} — ${lv}
User speaks French.
Return ONLY valid JSON, no markdown:
{
  "character": "Description in French",
  "setting": "Scene in French",
  "opening": { "target": "Opening in ${langName}", "fr": "French translation" },
  "exchanges": [
    {
      "context": "Context in French or null",
      "userOptions": [
        { "phrase": "Phrase in ${langName}", "fr": "French", "phonetic": "Phonetics e.g. bon-DJOR-no" },
        { "phrase": "Alt phrase in ${langName}", "fr": "French", "phonetic": "Phonetics" }
      ],
      "characterResponse": { "target": "Response in ${langName}", "fr": "French" },
      "tip": "Pronunciation or cultural tip in French"
    }
  ]
}
Include exactly 6 exchanges.`;
}

function buildConvSystem(langName, sc, level) {
  const lv = { beginner:'Simple sentences. Detailed corrections.', intermediate:'Natural language. Correct grammar and pronunciation.', advanced:'Idiomatic. Only correct significant errors.' }[level];
  return `You are an immersive language tutor playing a character. Help a French speaker practice ${langName}.
SCENARIO: ${sc.title} — ${sc.desc}
LEVEL: ${lv}
User speaks via voice (transcribed). Always give pronunciation feedback.

FORMAT:
[CHARACTER]
Response in ${langName}. 2-4 sentences.
[/CHARACTER]
[PHONETIC]
Key words phonetics: "word" → foh-NET-ik
[/PHONETIC]
[FEEDBACK]
In French:
- ✅ Ce qui était bien
- 🔧 Corrections (if any)
- 🗣 Prononciation tips for French speakers
- 💡 Conseil (optional)
[/FEEDBACK]`;
}

function parseConv(text) {
  return {
    character: text.match(/\[CHARACTER\]([\s\S]*?)\[\/CHARACTER\]/)?.[1]?.trim() || text,
    phonetic:  text.match(/\[PHONETIC\]([\s\S]*?)\[\/PHONETIC\]/)?.[1]?.trim()  || null,
    feedback:  text.match(/\[FEEDBACK\]([\s\S]*?)\[\/FEEDBACK\]/)?.[1]?.trim()  || null,
  };
}

async function generateScenario(apiKey, lang, sc, level) {
  const raw = await geminiCall(apiKey,
    'Return ONLY valid JSON. No markdown. No explanation.',
    [{ role:'user', content: buildGenPrompt(lang.name, lang.bcp47, sc, level) }]
  );
  return JSON.parse(raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());
}

// ── Hooks ──────────────────────────────────────────────────
const { useState, useEffect, useRef } = React;

function useOnline() {
  const [on, setOn] = useState(navigator.onLine);
  useEffect(() => {
    const a = ()=>setOn(true), b = ()=>setOn(false);
    window.addEventListener('online',a); window.addEventListener('offline',b);
    return ()=>{ window.removeEventListener('online',a); window.removeEventListener('offline',b); };
  },[]);
  return on;
}

// ── Écran clé API ──────────────────────────────────────────
function ApiKeyScreen({ onSave }) {
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  async function handle() {
    if (!key.trim()) return;
    setBusy(true); setErr('');
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key.trim()}`;
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{role:'user',parts:[{text:'Reply OK'}]}], generationConfig:{maxOutputTokens:5} }) });
      if (!res.ok) throw new Error();
      await dbSet('settings','apiKey', key.trim());
      onSave(key.trim());
    } catch { setErr('Clé invalide. Vérifiez sur aistudio.google.com'); }
    setBusy(false);
  }

  return (
    <div className="screen" style={{ alignItems:'center', justifyContent:'center', padding:'2rem 1.5rem' }}>
      <div style={{ maxWidth:420, width:'100%' }}>
        <div style={{ textAlign:'center', marginBottom:'2rem' }}>
          <div style={{ fontSize:'3rem', marginBottom:'.5rem' }}>🎙</div>
          <h1 style={{ fontFamily:'var(--serif)', fontSize:'2.2rem', fontWeight:400, marginBottom:'.4rem' }}>Langue Vivante</h1>
          <p style={{ color:'var(--dim)', fontSize:'.88rem', fontWeight:300 }}>Apprendre par l'immersion</p>
        </div>
        <div style={{ background:'var(--card)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1.4rem' }}>
          <p style={{ fontSize:'.82rem', lineHeight:1.7, color:'var(--dim)', marginBottom:'1.2rem' }}>
            Entrez votre clé API Google Gemini.<br/>
            Elle sera stockée <strong style={{color:'var(--fg)'}}>uniquement sur votre téléphone</strong>, jamais sur internet.
          </p>
          <p className="label" style={{ display:'block', marginBottom:'.5rem' }}>Clé API Gemini</p>
          <input className="key-input" type="password" placeholder="AIzaSy..."
            value={key} onChange={e=>setKey(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handle()}
            style={{ display:'block', marginBottom:'.8rem' }} />
          {err && <p style={{ color:'#e74c3c', fontSize:'.78rem', marginBottom:'.8rem' }}>{err}</p>}
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={handle} disabled={!key.trim()||busy}>
            {busy ? 'Vérification…' : 'Continuer →'}
          </button>
          <p style={{ fontSize:'.7rem', color:'var(--dim2)', marginTop:'1rem', textAlign:'center', lineHeight:1.6 }}>
            Clé gratuite sur <strong style={{color:'var(--dim)'}}>aistudio.google.com</strong>
          </p>
        </div>
      </div>
    </div>
  );
}

// ── Écran setup ────────────────────────────────────────────
function SetupScreen({ onConfirm, savedLang, savedLevel, onChangeKey }) {
  const [lang,  setLang]  = useState(savedLang  || null);
  const [level, setLevel] = useState(savedLevel || 'intermediate');

  return (
    <div className="screen">
      <div className="header" style={{ justifyContent:'space-between' }}>
        <h1 style={{ fontFamily:'var(--serif)', fontSize:'1.3rem', fontWeight:400 }}>🎙 Langue Vivante</h1>
        <button className="btn-ghost" onClick={onChangeKey}>🔑 Clé</button>
      </div>
      <div className="scroll" style={{ padding:'1.2rem 1rem 1.5rem' }}>
        <section style={{ marginBottom:'1.8rem' }}>
          <p className="label" style={{ marginBottom:'.7rem' }}>Je veux apprendre…</p>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'.55rem' }}>
            {LANGUAGES.map(l => (
              <div key={l.code} className={`card ${lang?.code===l.code?'sel':''}`} onClick={()=>setLang(l)}
                style={{ display:'flex', alignItems:'center', gap:'.6rem' }}>
                <span style={{ fontSize:'1.4rem' }}>{l.flag}</span>
                <span style={{ fontWeight:500, fontSize:'.9rem' }}>{l.name}</span>
              </div>
            ))}
          </div>
        </section>
        <section style={{ marginBottom:'2rem' }}>
          <p className="label" style={{ marginBottom:'.7rem' }}>Mon niveau</p>
          <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
            {LEVELS.map(lv => (
              <div key={lv.id} className={`card ${level===lv.id?'sel':''}`} onClick={()=>setLevel(lv.id)}
                style={{ display:'flex', alignItems:'center', gap:'.9rem' }}>
                <div style={{ width:18, height:18, borderRadius:'50%', border:'2px solid', borderColor:level===lv.id?'var(--gold)':'var(--dim2)', background:level===lv.id?'var(--gold)':'transparent', flexShrink:0 }} />
                <div>
                  <div style={{ fontWeight:600, fontSize:'.88rem' }}>{lv.label}</div>
                  <div style={{ fontSize:'.72rem', color:'var(--dim)', marginTop:'.1rem' }}>{lv.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </section>
        <button className="btn btn-gold" style={{ width:'100%' }} disabled={!lang} onClick={()=>onConfirm(lang,level)}>
          Choisir un scénario →
        </button>
      </div>
    </div>
  );
}

// ── Écran accueil ──────────────────────────────────────────
function HomeScreen({ lang, level, apiKey, onPlay, onConverse, onSettings }) {
  const [cached, setCached] = useState({});
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(null);
  const online = useOnline();

  useEffect(() => {
    dbGetAll('scenarios', `${lang.code}_${level}_`).then(all => {
      const map = {};
      all.forEach(item => { map[item.key.replace(`${lang.code}_${level}_`,'')] = item; });
      setCached(map); setLoading(false);
    });
  },[lang,level]);

  async function gen(sc) {
    if (!online) return;
    setGenerating(sc.id);
    try {
      const data = await generateScenario(apiKey, lang, sc, level);
      const key = `${lang.code}_${level}_${sc.id}`;
      await dbSet('scenarios', key, data);
      setCached(prev => ({ ...prev, [sc.id]: data }));
    } catch { alert('Erreur. Vérifiez votre connexion et votre clé API.'); }
    setGenerating(null);
  }

  async function genAll() {
    for (const sc of SCENARIO_DEFS.filter(s=>!cached[s.id])) await gen(sc);
  }

  const missing = SCENARIO_DEFS.filter(s=>!cached[s.id]).length;

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={onSettings}>⚙</button>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:600, fontSize:'.9rem' }}>{lang.flag} {lang.name} · {LEVELS.find(l=>l.id===level)?.label}</div>
          <span className={`badge ${online?'badge-online':'badge-offline'}`}>{online?'⬤ En ligne':'⬤ Hors ligne'}</span>
        </div>
        {online && missing > 0 && (
          <button className="btn-ghost" onClick={genAll} disabled={generating!==null}>
            {generating?'…':`⬇ Tout (${missing})`}
          </button>
        )}
      </div>
      {loading ? (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ display:'flex', gap:'.5rem' }}><div className="gen-dot"/><div className="gen-dot"/><div className="gen-dot"/></div>
        </div>
      ) : (
        <div className="scroll" style={{ padding:'1rem' }}>
          <p style={{ fontSize:'.78rem', color:'var(--dim)', marginBottom:'1rem', lineHeight:1.6 }}>
            {online ? 'Téléchargez les scénarios en WiFi pour les utiliser hors ligne en voiture.' : 'Hors ligne — utilisez les scénarios téléchargés.'}
          </p>
          <div style={{ display:'flex', flexDirection:'column', gap:'.65rem' }}>
            {SCENARIO_DEFS.map(sc => {
              const ok = !!cached[sc.id];
              const isG = generating===sc.id;
              return (
                <div key={sc.id} style={{ background:'var(--card)', border:'1px solid', borderColor:ok?'rgba(210,170,100,.2)':'var(--cardborder)', borderRadius:14, padding:'1rem 1.1rem' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'.7rem', marginBottom:'.4rem' }}>
                    <span style={{ fontSize:'1.3rem' }}>{sc.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:600, fontSize:'.9rem' }}>{sc.title}</div>
                      <div style={{ fontSize:'.72rem', color:'var(--dim)', marginTop:'.1rem' }}>{sc.desc}</div>
                    </div>
                    {ok && <span style={{ fontSize:'.65rem', color:'var(--gold)' }}>✓</span>}
                  </div>
                  {ok ? (
                    <div style={{ display:'flex', gap:'.5rem', marginTop:'.6rem' }}>
                      <button className="btn btn-gold" style={{ flex:1, padding:'.55rem', fontSize:'.8rem' }} onClick={()=>onPlay(sc,cached[sc.id])}>📚 Pratiquer</button>
                      {online && <button className="btn-ghost" style={{ padding:'.55rem .8rem' }} onClick={()=>onConverse(sc)}>💬</button>}
                      {online && <button className="btn-ghost" style={{ padding:'.55rem .8rem' }} onClick={()=>gen(sc)} disabled={isG}>{isG?'…':'↻'}</button>}
                    </div>
                  ) : (
                    <div style={{ display:'flex', gap:'.5rem', marginTop:'.6rem' }}>
                      {online ? (
                        <>
                          <button className="btn-ghost" style={{ flex:1, padding:'.55rem', fontSize:'.8rem' }} onClick={()=>gen(sc)} disabled={isG}>
                            {isG ? <span style={{display:'flex',alignItems:'center',gap:'.4rem'}}><span style={{display:'flex',gap:'3px'}}><div className="gen-dot" style={{width:6,height:6}}/><div className="gen-dot" style={{width:6,height:6}}/><div className="gen-dot" style={{width:6,height:6}}/></span>Génération…</span> : '⬇ Télécharger'}
                          </button>
                          <button className="btn btn-gold" style={{ padding:'.55rem .9rem', fontSize:'.85rem' }} onClick={()=>onConverse(sc)}>💬</button>
                        </>
                      ) : <p style={{ fontSize:'.75rem', color:'var(--dim2)', padding:'.3rem 0' }}>Connectez-vous pour télécharger</p>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ height:'1.5rem' }} />
        </div>
      )}
    </div>
  );
}

// ── Pratique guidée ────────────────────────────────────────
function PlayScreen({ scenario, data, lang, onBack }) {
  const [step, setStep] = useState(-1);
  const [chosen, setChosen] = useState(null);
  const [showResp, setShowResp] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [recording, setRecording] = useState(false);
  const [recognized, setRecognized] = useState('');
  const [showPhonetic, setShowPhonetic] = useState(null);
  const recRef = useRef(null);
  const total = data.exchanges.length;
  const exchange = step >= 0 ? data.exchanges[step] : null;

  function doSpeak(text, cb) { setSpeaking(true); speak(text, lang.bcp47, ()=>{ setSpeaking(false); cb?.(); }); }

  function handleStart() { setStep(0); setChosen(null); setShowResp(false); setRecognized(''); setShowPhonetic(null); doSpeak(data.opening.target); }

  function handleChoose(i) {
    if (chosen!==null) return;
    setChosen(i); setShowPhonetic(i);
    setTimeout(()=>doSpeak(exchange.userOptions[i].phrase, ()=>{
      setTimeout(()=>{ setShowResp(true); doSpeak(exchange.characterResponse.target); }, 600);
    }), 300);
  }

  function handleListen() {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR) { alert('Utilisez Chrome'); return; }
    stopSpeaking();
    const rec = new SR(); rec.lang = lang.bcp47; recRef.current = rec;
    rec.onstart = ()=>{ setRecording(true); setRecognized(''); };
    rec.onresult = e=>{ setRecognized(Array.from(e.results).map(r=>r[0].transcript).join('')); };
    rec.onend = ()=>setRecording(false);
    rec.onerror = ()=>setRecording(false);
    rec.start();
  }

  function handleNext() {
    const n = step+1; setStep(n); setChosen(null); setShowResp(false); setRecognized(''); setShowPhonetic(null);
  }

  if (step >= total) return (
    <div className="screen" style={{ alignItems:'center', justifyContent:'center', padding:'2rem', textAlign:'center' }}>
      <div style={{ fontSize:'3rem', marginBottom:'1rem' }}>🎉</div>
      <h2 style={{ fontFamily:'var(--serif)', fontSize:'1.6rem', marginBottom:'.6rem' }}>Scénario terminé !</h2>
      <p style={{ color:'var(--dim)', fontSize:'.88rem', lineHeight:1.7, marginBottom:'2rem' }}>Bravo ! Recommencez ou essayez le mode libre.</p>
      <button className="btn btn-gold" onClick={onBack}>← Retour</button>
    </div>
  );

  if (step === -1) return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={onBack}>← Retour</button>
        <div style={{ flex:1, textAlign:'center', fontWeight:600, fontSize:'.9rem' }}>{scenario.icon} {scenario.title}</div>
        <div style={{ width:60 }} />
      </div>
      <div className="scroll" style={{ padding:'1.5rem 1rem', display:'flex', flexDirection:'column', gap:'1.2rem' }}>
        <div className="card"><p className="label" style={{ marginBottom:'.5rem' }}>La situation</p><p style={{ fontSize:'.92rem', lineHeight:1.7 }}>{data.setting}</p></div>
        <div className="card"><p className="label" style={{ marginBottom:'.5rem' }}>Votre interlocuteur</p><p style={{ fontSize:'.92rem' }}>{data.character}</p></div>
        <div style={{ background:'rgba(210,170,100,.07)', border:'1px solid rgba(210,170,100,.2)', borderRadius:14, padding:'1.2rem' }}>
          <p className="label" style={{ marginBottom:'.5rem' }}>Première réplique</p>
          <p style={{ fontFamily:'var(--serif)', fontStyle:'italic', fontSize:'1rem', lineHeight:1.65, marginBottom:'.5rem' }}>{data.opening.target}</p>
          <p style={{ fontSize:'.78rem', color:'var(--dim)' }}>🇫🇷 {data.opening.fr}</p>
        </div>
        <button className="btn btn-gold" style={{ width:'100%', padding:'1rem' }} onClick={handleStart}>🎙 Commencer</button>
      </div>
    </div>
  );

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={onBack}>← Retour</button>
        <div style={{ flex:1, padding:'0 .5rem' }}>
          <div style={{ fontWeight:500, fontSize:'.82rem', marginBottom:'.3rem' }}>{scenario.icon} {step+1}/{total}</div>
          <div className="progress-bar"><div className="progress-fill" style={{ width:`${((step+1)/total)*100}%` }}/></div>
        </div>
        {speaking ? <div className="waves"><div className="wave"/><div className="wave"/><div className="wave"/><div className="wave"/></div>
          : <button className="btn-icon" onClick={()=>doSpeak(showResp?exchange.characterResponse.target:data.opening.target)}>🔊</button>}
      </div>
      <div className="scroll" style={{ padding:'1rem', display:'flex', flexDirection:'column', gap:'1rem' }}>
        <div>
          {exchange.context && <p style={{ fontSize:'.75rem', color:'var(--dim)', marginBottom:'.5rem', fontStyle:'italic' }}>📍 {exchange.context}</p>}
          <div style={{ background:'rgba(255,255,255,.04)', border:'1px solid var(--cardborder)', borderRadius:14, padding:'1rem 1.1rem' }}>
            <p style={{ fontSize:'.7rem', color:'var(--dim)', marginBottom:'.4rem' }}>{showResp?'Réponse :':'Le personnage dit :'}</p>
            <p style={{ fontFamily:'var(--serif)', fontStyle:'italic', fontSize:'.97rem', lineHeight:1.65, marginBottom: showResp?'.5rem':0 }}>
              {showResp ? exchange.characterResponse.target : (step===0?data.opening.target:exchange.characterResponse?.target||'…')}
            </p>
            {showResp && <p style={{ fontSize:'.75rem', color:'var(--dim)' }}>🇫🇷 {exchange.characterResponse.fr}</p>}
            {showResp && exchange.tip && (
              <div style={{ marginTop:'.7rem', background:'rgba(210,170,100,.07)', border:'1px solid rgba(210,170,100,.18)', borderRadius:8, padding:'.6rem .8rem' }}>
                <p style={{ fontSize:'.73rem', color:'var(--gold)', lineHeight:1.6 }}>💡 {exchange.tip}</p>
              </div>
            )}
          </div>
        </div>
        {!showResp && (
          <div>
            <p style={{ fontSize:'.72rem', color:'var(--dim)', marginBottom:'.6rem' }}>Choisissez ce que vous dites :</p>
            <div style={{ display:'flex', flexDirection:'column', gap:'.55rem' }}>
              {exchange.userOptions.map((opt,i) => (
                <div key={i} className={`phrase-card ${chosen===i?'active':''}`} onClick={()=>handleChoose(i)}>
                  <div style={{ fontWeight:500, fontSize:'.92rem' }}>{opt.phrase}</div>
                  <div className="phrase-fr">{opt.fr}</div>
                  {showPhonetic===i && <div className="phrase-phonetic">🔊 {opt.phonetic}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
        {chosen!==null && !showResp && (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'.7rem', padding:'.5rem 0' }}>
            <p style={{ fontSize:'.75rem', color:'var(--dim)', textAlign:'center' }}>Entraînez-vous à prononcer :</p>
            <button className={`mic ${recording?'mic-rec':'mic-idle'}`}
              onMouseDown={handleListen} onMouseUp={()=>recRef.current?.stop()}
              onTouchStart={e=>{e.preventDefault();handleListen();}} onTouchEnd={e=>{e.preventDefault();recRef.current?.stop();}}>
              {recording?'⏹':'🎙'}
            </button>
            {recognized && <div style={{ background:'rgba(255,255,255,.04)', borderRadius:10, padding:'.6rem .9rem', fontSize:'.82rem', textAlign:'center' }}>Reconnu : <em>"{recognized}"</em></div>}
          </div>
        )}
        {showResp && <button className="btn btn-gold" style={{ width:'100%', padding:'1rem' }} onClick={handleNext}>{step+1>=total?'Terminer ✓':'Suivant →'}</button>}
        <div style={{ height:'1.5rem' }} />
      </div>
    </div>
  );
}

// ── Conversation libre ──────────────────────────────────────
function ConvScreen({ scenario, lang, level, apiKey, onBack }) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [speaking, setSpeaking] = useState(false);
  const [recording, setRecording] = useState(false);
  const [liveText, setLiveText] = useState('');
  const [textInput, setTextInput] = useState('');
  const [inputMode, setInputMode] = useState('voice');
  const [expanded, setExpanded] = useState({});
  const msgsRef = useRef([]); msgsRef.current = messages;
  const recRef = useRef(null); const lastRef = useRef('');
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,loading]);
  useEffect(()=>{ startScene(); return ()=>stopSpeaking(); },[]);

  async function startScene() {
    const sys = buildConvSystem(lang.name, scenario, level);
    const opening = `(Start the scene. Your natural opening line as character — 1-3 sentences. In [FEEDBACK], welcome user in French, describe situation, give 3 starter phrases in ${lang.name} with French translation and phonetics.)`;
    try {
      const raw = await geminiCall(apiKey, sys, [{role:'user',content:opening}]);
      const parsed = parseConv(raw);
      const msg = { role:'assistant', ...parsed, id:Date.now() };
      setMessages([msg]); setExpanded({[msg.id]:true});
      setTimeout(()=>{ setSpeaking(true); speak(parsed.character, lang.bcp47, ()=>setSpeaking(false)); }, 500);
    } catch { setMessages([{role:'assistant',character:'Erreur de démarrage.',phonetic:null,feedback:null,id:Date.now()}]); }
    setLoading(false);
  }

  async function sendMsg(text) {
    if (!text.trim()||loading) return;
    stopSpeaking(); setSpeaking(false);
    const userMsg = {role:'user',content:text.trim(),id:Date.now()};
    const updated = [...msgsRef.current, userMsg];
    setMessages(updated); setLoading(true);
    const sys = buildConvSystem(lang.name, scenario, level);
    const apiMsgs = updated.map(m=>({ role:m.role, content:m.role==='user'?m.content:`[CHARACTER]\n${m.character}\n[/CHARACTER]\n\n[PHONETIC]\n${m.phonetic||''}\n[/PHONETIC]\n\n[FEEDBACK]\n${m.feedback||''}\n[/FEEDBACK]` }));
    try {
      const raw = await geminiCall(apiKey, sys, apiMsgs);
      const parsed = parseConv(raw);
      const msg = {role:'assistant',...parsed,id:Date.now()};
      setMessages(prev=>[...prev,msg]);
      setSpeaking(true); speak(parsed.character, lang.bcp47, ()=>setSpeaking(false));
    } catch { setMessages(prev=>[...prev,{role:'assistant',character:'Erreur réseau.',phonetic:null,feedback:null,id:Date.now()}]); }
    setLoading(false);
  }

  function startRec() {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR) { alert('Utilisez Chrome'); return; }
    if (loading) return;
    stopSpeaking(); setSpeaking(false);
    const rec = new SR(); rec.lang = lang.bcp47; rec.interimResults = true;
    recRef.current = rec; lastRef.current = '';
    rec.onstart = ()=>{ setRecording(true); setLiveText(''); };
    rec.onresult = e=>{ let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; setLiveText(t); lastRef.current=t; };
    rec.onend = ()=>{ setRecording(false); setLiveText(''); if(lastRef.current.trim()) sendMsg(lastRef.current); };
    rec.onerror = ()=>{ setRecording(false); setLiveText(''); };
    rec.start();
  }

  const lastAsst = messages.filter(m=>m.role==='assistant').at(-1);

  return (
    <div className="screen">
      <div className="header">
        <button className="btn-ghost" onClick={()=>{stopSpeaking();onBack();}}>← Retour</button>
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontWeight:500, fontSize:'.82rem' }}>{scenario.icon} {scenario.title}</div>
          <div style={{ fontSize:'.65rem', color:'var(--dim)' }}>{lang.flag} {lang.name} · Libre</div>
        </div>
        {speaking ? <div className="waves"><div className="wave"/><div className="wave"/><div className="wave"/></div>
          : lastAsst ? <button className="btn-icon" style={{ fontSize:'1.1rem' }} onClick={()=>{setSpeaking(true);speak(lastAsst.character,lang.bcp47,()=>setSpeaking(false));}}>🔊</button>
          : <div style={{ width:36 }}/>}
      </div>
      <div className="scroll" style={{ padding:'1rem', display:'flex', flexDirection:'column', gap:'.9rem' }}>
        {messages.map(msg => (
          <div key={msg.id} style={{ display:'flex', flexDirection:'column' }}>
            {msg.role==='user' ? <div className="bubble-user">{msg.content}</div> : (
              <div style={{ alignSelf:'flex-start', maxWidth:'88%' }}>
                <div className="bubble-char">
                  {msg.character}
                  {msg.phonetic && <span style={{ display:'block', fontFamily:'var(--sans)', fontSize:'.68rem', color:'var(--dim)', fontStyle:'normal', marginTop:'.35rem' }}>🔊 {msg.phonetic}</span>}
                </div>
                {msg.feedback && <>
                  <button className="btn-ghost" style={{ marginTop:'.4rem' }} onClick={()=>setExpanded(p=>({...p,[msg.id]:!p[msg.id]}))}>
                    {expanded[msg.id]?'▲ Masquer':'▼ Retour pédagogique'}
                  </button>
                  {expanded[msg.id] && <div className="feedback-box" style={{ marginTop:'.4rem' }}>{msg.feedback}</div>}
                </>}
              </div>
            )}
          </div>
        ))}
        {loading && <div style={{ alignSelf:'flex-start' }}><div className="bubble-char" style={{ color:'var(--dim2)' }}><span className="dots"><span>●</span> <span>●</span> <span>●</span></span></div></div>}
        {recording && liveText && <div style={{ alignSelf:'flex-end', fontStyle:'italic', fontSize:'.85rem', color:'var(--dim)', padding:'.5rem .9rem', background:'rgba(255,255,255,.03)', borderRadius:10, maxWidth:'80%' }}>{liveText}…</div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{ borderTop:'1px solid rgba(255,255,255,.07)', padding:'.9rem 1rem', background:'rgba(0,0,0,.2)', flexShrink:0 }} className="safe-bottom">
        {inputMode==='voice' ? (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'.55rem' }}>
            <button className={`mic ${recording?'mic-rec':'mic-idle'}`}
              onMouseDown={startRec} onMouseUp={()=>recRef.current?.stop()}
              onTouchStart={e=>{e.preventDefault();startRec();}} onTouchEnd={e=>{e.preventDefault();recRef.current?.stop();}}
              disabled={loading}>{recording?'⏹':'🎙'}</button>
            <p style={{ fontSize:'.68rem', color:'var(--dim2)', textAlign:'center' }}>
              {recording?`Parlez en ${lang.name}… relâchez`:loading?'Réponse en cours…':'Maintenez pour parler'}
            </p>
            <button className="btn-ghost" onClick={()=>setInputMode('text')}>⌨ Texte</button>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
            <div style={{ display:'flex', gap:'.5rem', alignItems:'flex-end' }}>
              <textarea className="text-input" rows={2} placeholder={`Écrivez en ${lang.name}…`}
                value={textInput} onChange={e=>setTextInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(textInput);setTextInput('');}}}
                disabled={loading}/>
              <button className="btn btn-gold" style={{ padding:'.7rem .9rem', flexShrink:0 }}
                onClick={()=>{sendMsg(textInput);setTextInput('');}} disabled={loading||!textInput.trim()}>→</button>
            </div>
            <button className="btn-ghost" style={{ alignSelf:'center' }} onClick={()=>setInputMode('voice')}>🎙 Voix</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App principale ──────────────────────────────────────────
function App() {
  const [screen,   setScreen]   = useState('loading');
  const [apiKey,   setApiKey]   = useState('');
  const [lang,     setLang]     = useState(null);
  const [level,    setLevel]    = useState('intermediate');
  const [playData, setPlayData] = useState(null);
  const [playScen, setPlayScen] = useState(null);
  const [convScen, setConvScen] = useState(null);

  useEffect(()=>{
    async function boot() {
      try {
        const key    = await dbGet('settings','apiKey');
        const langK  = await dbGet('settings','lang');
        const levelK = await dbGet('settings','level');
        if (key)    setApiKey(key);
        if (langK)  setLang(langK);
        if (levelK) setLevel(levelK);
        setScreen(key ? (langK?'home':'setup') : 'apikey');
      } catch { setScreen('apikey'); }
    }
    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    if (window.speechSynthesis) { window.speechSynthesis.getVoices(); window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices()); }
  },[]);

  async function handleApiKey(key) { setApiKey(key); setScreen(lang?'home':'setup'); }

  async function handleSetup(l, lv) {
    await dbSet('settings','lang',l); await dbSet('settings','level',lv);
    setLang(l); setLevel(lv); setScreen('home');
  }

  if (screen==='loading') return <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}><div style={{ display:'flex', gap:'.5rem' }}><div className="gen-dot"/><div className="gen-dot"/><div className="gen-dot"/></div></div>;
  if (screen==='apikey') return <ApiKeyScreen onSave={handleApiKey}/>;
  if (screen==='setup')  return <SetupScreen onConfirm={handleSetup} savedLang={lang} savedLevel={level} onChangeKey={()=>setScreen('apikey')}/>;
  if (screen==='home')   return <HomeScreen lang={lang} level={level} apiKey={apiKey} onPlay={(sc,data)=>{setPlayScen(sc);setPlayData(data);setScreen('play');}} onConverse={sc=>{setConvScen(sc);setScreen('conv');}} onSettings={()=>setScreen('setup')}/>;
  if (screen==='play'&&playData) return <PlayScreen scenario={playScen} data={playData} lang={lang} onBack={()=>setScreen('home')}/>;
  if (screen==='conv'&&convScen) return <ConvScreen scenario={convScen} lang={lang} level={level} apiKey={apiKey} onBack={()=>setScreen('home')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
